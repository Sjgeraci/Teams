<!DOCTYPE html>
<html>
<head>
    <title>Opening Project Operations...</title>

    <script>
        function openInBrowser() {
            var url = "https://org.crm.dynamics.com/main.aspx?appid=XXXX";

            // Try multiple breakout approaches
            try {
                // Method 1: Top window redirect (strongest)
                window.top.location.href = url;
            } catch (e) {
                console.log("Top redirect blocked");
            }

            try {
                // Method 2: Parent redirect
                window.parent.location.href = url;
            } catch (e) {
                console.log("Parent redirect blocked");
            }

            try {
                // Method 3: Standard redirect fallback
                window.location.href = url;
            } catch (e) {
                console.log("Standard redirect blocked");
            }
        }

        // Run immediately
        openInBrowser();
    </script>
</head>
<body>
    Opening Kiel Project Operations...
</body>
</html>
